name: CI/CD for DDFeetBackBot

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: List files for debugging
        run: ls -la

      - name: Get short commit hash
        id: vars
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        run: |
          docker build --no-cache \
            -t ${{ secrets.DOCKER_USERNAME }}/ddfeetbackbot:${{ steps.vars.outputs.COMMIT_HASH }} .
          docker tag \
            ${{ secrets.DOCKER_USERNAME }}/ddfeetbackbot:${{ steps.vars.outputs.COMMIT_HASH }} \
            ${{ secrets.DOCKER_USERNAME }}/ddfeetbackbot:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ddfeetbackbot:${{ steps.vars.outputs.COMMIT_HASH }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ddfeetbackbot:latest

